<div class="language-switcher">

  <button
    type="button"
    [class.active]="activeLang() === 'en'"
    (click)="changeLanguage('en')">
    EN
  </button>

  <button
    type="button"
    [class.active]="activeLang() === 'ru'"
    (click)="changeLanguage('ru')">
    RU
  </button>

  <button
    type="button"
    [class.active]="activeLang() === 'uz'"
    (click)="changeLanguage('uz')">
    UZ
  </button>

</div>
