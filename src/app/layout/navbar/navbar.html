<header class="navbar">

  <div class="container">

    <a href="" class="logo" (click)="scrollToSection($event, 'home')">
      <span class="logo-text">ROSSMANN</span>
    </a>

    <nav class="nav-links">

      <a href="" (click)="scrollToSection($event, 'home')">
        {{ 'navbar.home' | transloco }}
      </a>

      <a href="" (click)="scrollToSection($event, 'hero')">
        {{ 'navbar.about' | transloco }}
      </a>

      <a href="" (click)="scrollToSection($event, 'services')">
        {{ 'navbar.services' | transloco }}
      </a>

      <a href="" (click)="scrollToSection($event, 'projects')">
        {{ 'navbar.projects' | transloco }}
      </a>

      <a routerLink="/contact" routerLinkActive="active">
        {{ 'navbar.contact' | transloco }}
      </a>

    </nav>

    <app-language-switcher></app-language-switcher>

  </div>

</header>
